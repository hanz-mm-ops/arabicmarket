<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="auth.js"></script>
<title>Store — The Arabic Market</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100vh; }
body { display: flex; flex-direction: column; }
main { flex: 1; }
:root {
  --bg: #fafaf8;
  --white: #ffffff;
  --black: #0a0a0a;
  --gray-100: #f5f5f3;
  --gray-200: #e8e8e4;
  --gray-300: #d0d0cc;
  --gray-400: #999;
  --gray-500: #666;
  --accent: #c8510b;
  --font: 'Space Grotesk', sans-serif;
  --body: 'Inter', sans-serif;
}
[data-theme="dark"] {
  --bg: #0a0a0a; --white: #141414; --black: #f0f0f0;
  --gray-100: #1a1a1a; --gray-200: #2a2a2a; --gray-300: #3a3a3a;
  --gray-400: #888; --gray-500: #aaa;
}
[data-theme="dark"] .nav { background: rgba(10,10,10,0.95); border-color: #222; }
[data-theme="dark"] .nav-logo img { filter: brightness(0) invert(1); }
[data-theme="dark"] .product-img { background: #2a2a2a; }
[data-theme="dark"] .product-img img { filter: brightness(0.82); }
[data-theme="dark"] .product-img .img-product { background: #2a2a2a; }
[data-theme="dark"] footer { background: #141414; }
[data-theme="dark"] .footer-logo img { filter: brightness(0) invert(1); }
[data-theme="dark"] .search-input { background: #1a1a1a; border-color: #333; color: #f0f0f0; }
.theme-toggle {
  color: var(--black); cursor: pointer; display: flex; align-items: center;
  background: none; border: none; padding: 0;
}
.theme-toggle svg { width: 20px; height: 20px; }
.theme-toggle .icon-sun { display: none; }
[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
body { background: var(--bg); color: var(--black); font-family: var(--body); -webkit-font-smoothing: antialiased; }
::selection { background: var(--black); color: var(--white); }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
.sar { display: inline-block; width: 1em; height: 1em; background: url('images/sar.svg') no-repeat center/contain; vertical-align: -0.1em; }
[data-theme="dark"] .sar { filter: brightness(0) invert(1); }

/* ─── NAV ─── */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,250,248,0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--gray-200);
}
.nav-inner {
  padding: 0 2rem;
  height: 80px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}
.nav-links {
  display: flex; gap: 2rem; align-items: center;
}
.nav-links a {
  font-size: 0.8rem; font-weight: 500; color: var(--gray-500);
  letter-spacing: 0.05em; text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--black); }
.nav-logo {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: var(--font); font-weight: 700; font-size: 1.1rem;
  justify-self: center;
}
.nav-logo img { height: 70px; width: auto; filter: brightness(0); }
.nav-right {
  display: flex; gap: 1.2rem; align-items: center;
  justify-self: end;
}
.nav-right a, .nav-cart {
  color: var(--black); display: flex; align-items: center; cursor: pointer;
}
.nav-right svg { width: 20px; height: 20px; }
.cart-count {
  background: var(--accent); color: var(--white);
  font-size: 0.55rem; font-weight: 700;
  width: 15px; height: 15px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: absolute; top: -5px; right: -8px;
}
.nav-cart { position: relative; }
.lang-btn {
  background: none; border: 1px solid var(--gray-300);
  color: var(--black); cursor: pointer;
  font-family: var(--font); font-size: 0.7rem; font-weight: 600;
  padding: 0.3rem 0.6rem; border-radius: 4px;
  letter-spacing: 0.03em; transition: all 0.2s;
}
.lang-btn:hover { background: var(--gray-100); }
[data-theme="dark"] .lang-btn { border-color: #444; }
.nav-user {
  color: var(--black); cursor: pointer;
  display: flex; align-items: center;
}
.nav-user svg { width: 20px; height: 20px; }
[dir="rtl"] .nav-links { direction: rtl; }

/* ─── STORE TOOLBAR ─── */
.store-toolbar {
  padding: 1.5rem 1.5rem 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.filter-tabs { display: flex; gap: 0.8rem; align-items: baseline; }
.filter-tab {
  font-family: var(--body); font-size: 0.8rem; font-weight: 400;
  color: var(--gray-400);
  background: none; border: none; cursor: pointer;
  padding: 0; transition: color 0.2s;
}
.filter-tab:hover { color: var(--black); }
.filter-tab.active { color: var(--black); font-weight: 500; }
.filter-tab sup {
  font-size: 0.55rem; vertical-align: super; margin-left: 1px;
}
.store-tools {
  display: flex; gap: 1rem; align-items: center;
}
.search-input {
  padding: 0.5rem 0.8rem;
  border: 1px solid var(--gray-200);
  font-family: var(--body); font-size: 0.8rem;
  background: var(--white); outline: none;
  width: 200px; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--black); }
.product-count {
  font-size: 0.75rem; color: var(--gray-400);
}

/* ─── GRID ─── */
.store-grid {
  padding: 1.5rem;
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 0.5rem;
}
.product-card {
  display: block; text-decoration: none; color: inherit; cursor: pointer;
}
.product-img {
  overflow: hidden; aspect-ratio: 3/4;
  position: relative; background: var(--gray-100);
}
.product-img img {
  width: 100%; height: 100%; object-fit: cover;
  transition: opacity 0.4s ease;
}
.product-img .img-model { position: relative; z-index: 1; }
.product-img .img-product {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover; background: var(--gray-100);
  opacity: 0; z-index: 2; transition: opacity 0.4s ease;
}
.product-card:hover .img-product { opacity: 1; }
.product-card:hover .img-model { opacity: 0; }
.product-badge {
  position: absolute; top: 0.7rem; left: 0.7rem;
  font-size: 0.6rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--black); z-index: 3;
}
.product-add {
  position: absolute; bottom: 0.7rem; right: 0.7rem;
  width: 28px; height: 28px;
  background: var(--white); border: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 3;
  opacity: 0; transition: opacity 0.3s ease;
}
.product-add svg { width: 14px; height: 14px; stroke: var(--black); }
.product-card:hover .product-add { opacity: 1; }
.product-info {
  padding: 0.6rem 0.2rem;
  display: flex; justify-content: space-between; align-items: baseline;
}
.product-name {
  font-size: 0.78rem; font-weight: 400; letter-spacing: -0.01em;
}
.product-price {
  font-size: 0.78rem; font-weight: 400; color: var(--gray-500);
}

/* ─── EMPTY ─── */
.empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 2rem; }
.empty-state p { font-size: 0.9rem; color: var(--gray-400); }

/* ─── FOOTER ─── */
footer {
  background: var(--black); color: var(--white);
  padding: 2rem; margin-top: 3rem;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
}
.footer-logo { display: inline-block; }
.footer-logo img { height: 50px; width: auto; filter: brightness(0) invert(1); opacity: 0.35; }
.footer-right { font-size: 0.7rem; color: rgba(255,255,255,0.25); }

/* ─── REVEAL ─── */
.reveal {
  opacity: 0; transform: translateY(15px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.reveal.show { opacity: 1; transform: translateY(0); }

/* ─── RESPONSIVE ─── */
@media (max-width: 1024px) { .store-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-inner { grid-template-columns: auto 1fr auto; height: 60px; padding: 0 1rem; }
  .nav-logo { justify-self: center; }
  .nav-logo img { height: 40px; }
  .nav-right { gap: 0.8rem; }
  .nav-right svg { width: 18px; height: 18px; }
  .lang-btn { font-size: 0.65rem; padding: 0.25rem 0.5rem; }
  .store-grid { grid-template-columns: repeat(2, 1fr); }
  .search-input { width: 140px; }
  .store-toolbar { padding: 1rem; }
}
</style>
<link rel="stylesheet" href="cart.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-links">
      <a href="store.html?collection=sudan">Republic of Sudan</a>
      <a href="store.html?collection=mad-scientist">The Mad Scientist</a>
    </div>
    <a href="index.html" class="nav-logo">
      <img src="images/logo.svg" alt="The Arabic Market">
    </a>
    <div class="nav-right">
      <button class="lang-btn" onclick="Lang.toggle(); location.reload();" aria-label="Switch language">
        <span class="lang-btn-text">عربي</span>
      </button>
      <a href="account.html" class="nav-user" aria-label="Account">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
      </button>
      <div class="nav-cart" onclick="Cart.open()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
        <span class="cart-count">0</span>
      </div>
    </div>
  </div>
</nav>

<main>
<!-- TOOLBAR -->
<div class="store-toolbar">
  <div class="filter-tabs" id="filterTabs"></div>
  <div class="store-tools">
    <input class="search-input" id="searchInput" type="text" placeholder="Search..." oninput="onSearch()">
    <span class="product-count" id="productCount"></span>
  </div>
</div>

<!-- GRID -->
<div class="store-grid" id="storeGrid"></div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <a href="index.html" class="footer-logo"><img src="images/logo.svg" alt="The Arabic Market"></a>
    <div class="footer-right">&copy; 2025 Designed in Sudan</div>
  </div>
</footer>

<script src="lang.js"></script>
<script>
const FALLBACK = {"collections":[{"id":"sudan","name":"Republic of Sudan"},{"id":"mad-scientist","name":"The Mad Scientist"}],"products":[{"id":"p1","collection":"sudan","name":"Sudan Statement Hoodie","price":85,"image":"images/hoodie-model.jpg","hoverImage":"images/hoodie-sudan.png","images":["images/hoodie-model.jpg","images/hoodie-sudan.png"],"status":"available"},{"id":"p2","collection":"sudan","name":"Heritage Emblem Cap","price":35,"image":"images/cap-model.jpg","hoverImage":"images/cap-angle.png","images":["images/cap-model.jpg","images/cap-angle.png"],"status":"available"},{"id":"p3","collection":"sudan","name":"Republic Tee","price":55,"image":"images/sweatshirt.jpg","hoverImage":"images/typography-sudan.png","images":["images/sweatshirt.jpg","images/typography-sudan.png"],"status":"available"},{"id":"p4","collection":"sudan","name":"Heritage Ice Cap","price":28,"image":"images/icecap-model.jpg","hoverImage":"images/beanie.png","images":["images/icecap-model.jpg","images/beanie.png"],"status":"available"},{"id":"p5","collection":"mad-scientist","name":"Rickshaw Tee","price":55,"image":"images/rickshaw-model-front.png","hoverImage":"images/rickshaw-model-back.png","images":["images/rickshaw-model-front.png","images/coffee-illustration.png"],"status":"available"},{"id":"p6","collection":"mad-scientist","name":"Caffein Beat","price":55,"image":"images/coffee-model-front.png","hoverImage":"images/coffee-model-back.png","images":["images/coffee-model-front.png","images/caffein-back.jpg"],"status":"available"}]};

let data = null, activeFilter = 'all', searchQuery = '';

async function init() {
  try { const r = await fetch('data.json?t='+Date.now()); data = await r.json(); } catch(e) { data = FALLBACK; }
  const params = new URLSearchParams(window.location.search);
  if (params.get('collection')) activeFilter = params.get('collection');
  buildFilters();
  renderProducts();
  initReveal();
}

function buildFilters() {
  const tabs = document.getElementById('filterTabs');
  const allCount = data.products.length;
  let html = `<button class="filter-tab ${activeFilter==='all'?'active':''}" onclick="setFilter('all',this)">View all<sup>${allCount}</sup></button>`;
  data.collections.forEach(c => {
    const count = data.products.filter(p => p.collection === c.id).length;
    html += `<button class="filter-tab ${activeFilter===c.id?'active':''}" onclick="setFilter('${c.id}',this)">${c.name}<sup>${count}</sup></button>`;
  });
  tabs.innerHTML = html;
}

function setFilter(id, btn) {
  activeFilter = id;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
  setTimeout(initReveal, 50);
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  renderProducts();
  setTimeout(initReveal, 50);
}

function renderProducts() {
  const grid = document.getElementById('storeGrid');
  let products = data.products;
  if (activeFilter !== 'all') products = products.filter(p => p.collection === activeFilter);
  if (searchQuery) {
    products = products.filter(p => {
      const col = data.collections.find(c => c.id === p.collection);
      return p.name.toLowerCase().includes(searchQuery) || (col && col.name.toLowerCase().includes(searchQuery));
    });
  }
  document.getElementById('productCount').textContent = products.length + ' product' + (products.length !== 1 ? 's' : '');
  if (products.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>No products found.</p></div>`;
    return;
  }
  grid.innerHTML = products.map(p => {
    const productImg = p.hoverImage || ((p.images && p.images.length > 1) ? p.images[1] : p.image);
    return `
      <a href="product.html?id=${p.id}" class="product-card reveal">
        <div class="product-img">
          <img class="img-model" src="${p.image}" alt="${p.name}">
          <img class="img-product" src="${productImg}" alt="${p.name}">
          <span class="product-badge">NEW IN</span>
          <div class="product-add">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          </div>
        </div>
        <div class="product-info">
          <span class="product-name">${p.name}</span>
          <span class="product-price">${p.price.toFixed(2)} <span class="sar"></span></span>
        </div>
      </a>`;
  }).join('');
}

function initReveal() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('show'); obs.unobserve(e.target); }});
  }, { threshold: 0.05 });
  document.querySelectorAll('.reveal:not(.show)').forEach(el => obs.observe(el));
}

function toggleTheme() {
  const curr = document.documentElement.getAttribute('data-theme');
  const next = curr === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
})();

init().then(() => Lang.apply());
</script>
<script src="cart.js"></script>
</body>
</html>
